name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'NapCatAndroid/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'NapCatAndroid/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x NapCatAndroid/gradlew

    - name: Build Debug APK
      run: |
        cd NapCatAndroid
        ./gradlew assembleDebug --no-daemon

    - name: Build Release APK
      run: |
        cd NapCatAndroid
        ./gradlew assembleRelease --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: napcat-debug
        path: NapCatAndroid/app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: napcat-release
        path: NapCatAndroid/app/build/outputs/apk/release/*.apk
